server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    resolver 127.0.0.11 valid=5s ipv6=off;

    set $api_upstream http://api:8080;

    # Proxy API calls to the backend service
    # Use $api_upstream with NO path suffix: nginx then forwards the full original URI,
    # so /api/auth/signup reaches the backend as /api/auth/signup.
    location /api/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check endpoint
    location /healthz {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # Serve static CSS
    location /css/ {
        try_files $uri =404;
    }

    # Static page routes
    location = / {
        try_files /index.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /signup {
        try_files /signup.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /login {
        try_files /login.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /post {
        try_files /post.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /profile {
        try_files /profile.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /users {
        try_files /users.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Dynamic user profile pages: /users/{username}
    location ~ ^/users/[^/]+$ {
        try_files /users/profile.html =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Default: serve file or 404
    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
}
