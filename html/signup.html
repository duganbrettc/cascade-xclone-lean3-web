<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XClone – Sign Up</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Sign Up</h1>
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required placeholder="Enter your username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Choose a password" />
        </div>
        <div id="signup-error" class="error-msg"></div>
        <button type="submit">Create Account</button>
      </form>
      <div class="auth-link">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('signup-form');
      var errEl = document.getElementById('signup-error');

      function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.add('visible');
      }

      function clearError() {
        errEl.textContent = '';
        errEl.classList.remove('visible');
      }

      function handleSubmit(e) {
        e.preventDefault();
        clearError();

        var username = form.elements['username'].value.trim();
        var password = form.elements['password'].value;

        if (!username || !password) {
          showError('Username and password are required.');
          return;
        }

        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Creating account…';

        fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { status: res.status, data: data };
            });
          })
          .then(function (resp) {
            if (resp.status === 201 || resp.status === 200) {
              var tok = resp.data.session_token || resp.data.token;
              if (tok) {
                localStorage.setItem('token', tok);
                localStorage.setItem('session_token', tok);
              }
              window.location.replace('/');
            } else {
              var msg = (resp.data && (resp.data.error || resp.data.message)) || 'Signup failed.';
              showError(msg);
              btn.disabled = false;
              btn.textContent = 'Create Account';
            }
          })
          .catch(function (err) {
            showError('Network error: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'Create Account';
          });
      }

      form.addEventListener('submit', handleSubmit);
    })();
  </script>
</body>
</html>
